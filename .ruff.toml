# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101", # asserts allowed in tests...
    "ARG", # Unused function args -> fixtures nevertheless are functionally relevant...
    "FBT", # Don't care about booleans as positional arguments in tests, e.g. via @pytest.mark.parametrize()
    "PLR2004", # Magic value used in comparison, ...
    "S311", # Standard pseudo-random generators are not suitable for cryptographic purposes
    "D104", # Don't care all that much about docs in tests
    "D100", # Don't care all that much about docs in tests
    "D103", # test function names are self-documenting
    "D213", "D401", # docstring style is noise on test helpers
    "EM101", "EM102", "TRY003", # inline messages fine in test asserts/helpers
    "SLF001" # tests may touch module internals (e.g. fixture builders)
]

# Diagnostic / manual-test scripts under scripts/ are kept CLI tools, not shipped
# integration code — relax docs, magic-value, exception-message-style, CLI-print
# and subprocess-path rules (the proven logic gets ported into custom_components/
# with full linting).
"scripts/**/*.py" = [
    "D100", "D101", "D103", "D107", "D205", "D209", "D213", # docstrings relaxed for CLI tools
    "PLR2004", # magic values are fine in a protocol prototype
    "TRY003", "EM101", "EM102", # inline exception messages are readable here
    "FBT001", "FBT002", # boolean CLI flags
    "ANN001", "ANN202", # partial annotations acceptable
    "T201", # print() is the CLI's output
    "S603", "S607", # subprocess with ffprobe/ffmpeg on PATH is intended
    "S324", # MD5 is what the EZVIZ backend requires (not our choice)
    "PLR0911", "PLR0912", "PLR0913", # branchy protocol handling / CLI helper arg counts
    "INP001", # standalone scripts, not an importable package
    "TC003", # keep type-only imports inline for readability in scripts
]

# Low-level protocol / codec modules: dense bit-twiddling (NAL-type masks, RTP
# fields, AES block maths) where naming every mask/constant hurts readability and
# the parse/decrypt functions are inherently branchy. Relaxed like scripts/ but
# scoped to these specific files — the rest of the integration keeps full linting.
# (See CLAUDE.md "Ruff Configuration" for the documented exception.)
"custom_components/ezviz_stream/{decrypt,ysproto}.py" = [
    "PLR2004", # magic values (bit masks, NAL types, RTP payload types)
    "C901", "PLR0911", "PLR0912", "PLR0915", # branchy depacketize/decrypt state machines
    "PLR0913", # protocol builders take several fields
    "TRY003", "EM101", "EM102", # short inline messages on ValueError are readable here
    "D205", "D209", "D213", # docstring layout is noise on these
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
